<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DELTA / MONITOR</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ═══════════════ TOP BAR ═══════════════ -->
  <header id="topBar">
    <div class="topBar-left">
      <div class="brand-shield">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M11 1 L21 6 L21 16 L11 21 L1 16 L1 6 Z" stroke="#4fa3ff" stroke-width="1.5" fill="rgba(79,163,255,0.1)"/>
          <path d="M11 5 L17 8.5 L17 15 L11 18 L5 15 L5 8.5 Z" fill="rgba(79,163,255,0.2)" stroke="#4fa3ff" stroke-width="1"/>
        </svg>
      </div>
      <span class="brand-name">DELTA</span>
      <span class="brand-sep">/</span>
      <span class="brand-module">MONITOR</span>
      <div class="top-divider"></div>
      <button class="topBtn active" title="Map View">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M1 3l4-2 6 2 4-2v12l-4 2-6-2-4 2V3z" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M5 1v12M11 3v12" stroke="currentColor" stroke-width="1"/></svg>
      </button>
      <button class="topBtn" title="Layers">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 1l7 4-7 4-7-4 7-4zM1 9l7 4 7-4M1 13l7 4 7-4" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
      </button>
      <button class="topBtn" title="Units">
        <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="6" cy="5" r="2.5" stroke="currentColor" stroke-width="1.2" fill="none"/><circle cx="11" cy="5" r="2.5" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M1 14c0-3 2-4 5-4s5 1 5 4" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
      </button>
    </div>
    <div class="topBar-center">
      <span id="clock" class="mono">--:--:--</span>
      <span class="coord-display mono" id="coordDisplay">---.-----°, ---.-----°</span>
    </div>
    <div class="topBar-right">
      <div class="status-pill live"><span class="pulse-dot"></span>LIVE</div>
      <!-- Theme toggle button -->
      <button class="topBtn" id="themeToggleBtn" title="Switch to light theme">
        <svg width="16" height="16" viewBox="0 0 16 16" id="themeIcon">
          <!-- Sun icon (shown in dark mode to switch to light) -->
          <circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.3" fill="none"/>
          <line x1="8" y1="1" x2="8" y2="3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="8" y1="13" x2="8" y2="15" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="1" y1="8" x2="3" y2="8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="13" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="2.9" y1="2.9" x2="4.3" y2="4.3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="11.7" y1="11.7" x2="13.1" y2="13.1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="11.7" y1="4.3" x2="13.1" y2="2.9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="2.9" y1="13.1" x2="4.3" y2="11.7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="topBtn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.1 3.1l1.4 1.4M11.5 11.5l1.4 1.4M3.1 12.9l1.4-1.4M11.5 4.5l1.4-1.4" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
      <button class="topBtn" title="User">
        <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M2 14c0-4 2.7-5 6-5s6 1 6 5" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
      </button>
    </div>
  </header>
  <!-- ═══════════════ MAIN AREA ═══════════════ -->
  <div id="appBody">
    <!-- ── LEFT PANEL ── -->
    <aside id="leftPanel">
      <!-- UNIT SYMBOL PALETTE (scrollable) -->
      <section class="panel-section">
        <div class="section-header">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 2h8v8H2z" stroke="#4fa3ff" stroke-width="1.2" fill="none"/></svg>
          <span>UNIT SYMBOLS</span>
        </div>
        <div class="symbol-scroll-area">
          <div class="symbol-group">
            <div class="group-label">INFANTRY</div>
            <div class="symbol-row" id="row-infantry"></div>
          </div>
          <div class="symbol-group">
            <div class="group-label">ARMOR</div>
            <div class="symbol-row" id="row-tank"></div>
          </div>
          <div class="symbol-group">
            <div class="group-label">ARTILLERY</div>
            <div class="symbol-row" id="row-artillery"></div>
          </div>
          <div class="symbol-group">
            <div class="group-label">HELICOPTER</div>
            <div class="symbol-row" id="row-helicopter"></div>
          </div>
          <div class="symbol-group">
            <div class="group-label">POSITION</div>
            <div class="symbol-row" id="row-position"></div>
          </div>
          <div class="symbol-group">
            <div class="group-label">HUMVEE</div>
            <div class="symbol-row" id="row-humvee"></div>
          </div>
          <div class="symbol-group">
            <div class="group-label">TRUCK</div>
            <div class="symbol-row" id="row-truck"></div>
          </div>
        </div><!-- end symbol-scroll-area -->
      </section>
      <div class="panel-divider"></div>
      <!-- SEARCH COORDINATES -->
      <section class="panel-section">
        <div class="section-header">
          <svg width="12" height="12" viewBox="0 0 12 12"><circle cx="5" cy="5" r="4" stroke="#4fa3ff" stroke-width="1.2" fill="none"/><line x1="8" y1="8" x2="11" y2="11" stroke="#4fa3ff" stroke-width="1.2"/></svg>
          <span>GO TO COORDINATES</span>
        </div>
        <div class="coord-search-row">
          <input type="text" id="coordSearchInput" class="coord-input mono" placeholder="Y: 0.0000, X: 0.0000" />
          <button id="coordSearchBtn" class="coord-go-btn" title="Go to coordinates">GO</button>
        </div>
        <div id="coordSearchError" class="coord-error"></div>
      </section>
      <div class="panel-divider"></div>
      <!-- DRAWING TOOLS -->
      <section class="panel-section">
        <div class="section-header">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M8 1l3 3-7 7H1V8L8 1z" stroke="#4fa3ff" stroke-width="1.2" fill="none"/></svg>
          <span>DRAW TOOLS</span>
          <button id="toggleDrawMode" class="mode-toggle" title="Toggle drawing mode">OFF</button>
        </div>
        <div class="draw-tools-grid">
          <button class="drawToolBtn" data-tool="pen" title="Pen">
            <svg width="18" height="18" viewBox="0 0 18 18"><path d="M3 15 L12 4 L14 6 L5 17 Z" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M12 4 L14 2 L16 4 L14 6 Z" stroke="currentColor" stroke-width="1.3" fill="none"/><line x1="3" y1="15" x2="1" y2="17" stroke="currentColor" stroke-width="1.3"/></svg>
          </button>
          <button class="drawToolBtn" data-tool="line" title="Line">
            <svg width="18" height="18" viewBox="0 0 18 18"><line x1="3" y1="15" x2="15" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="3" cy="15" r="2" fill="currentColor"/><circle cx="15" cy="3" r="2" fill="currentColor"/></svg>
          </button>
          <button class="drawToolBtn" data-tool="arrow" title="Arrow">
            <svg width="18" height="18" viewBox="0 0 18 18"><line x1="3" y1="15" x2="13" y2="5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M13 5 L9 5 L13 9 Z" fill="currentColor"/></svg>
          </button>
          <button class="drawToolBtn" data-tool="circle" title="Circle">
            <svg width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="2" fill="none"/></svg>
          </button>
          <button class="drawToolBtn" data-tool="rect" title="Rectangle">
            <svg width="18" height="18" viewBox="0 0 18 18"><rect x="3" y="5" width="12" height="8" stroke="currentColor" stroke-width="2" fill="none"/></svg>
          </button>
          <button class="drawToolBtn" data-tool="eraser" title="Eraser">
            <svg width="18" height="18" viewBox="0 0 18 18"><rect x="2" y="8" width="14" height="7" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M2 11 h14" stroke="currentColor" stroke-width="1"/><path d="M7 15 v2 M11 15 v2" stroke="currentColor" stroke-width="1.5"/></svg>
          </button>
        </div>
        <!-- Pen Width -->
        <div class="slider-row">
          <span class="slider-label">WIDTH</span>
          <input type="range" id="penWidth" min="1" max="20" value="3" class="tac-slider">
          <span class="slider-val mono" id="penWidthVal">3</span>
        </div>
        <!-- Color Presets -->
        <div class="color-row">
          <span class="slider-label">COLOR</span>
          <div class="color-swatches">
            <button class="swatch active" data-color="#ff4444" style="background:#ff4444" title="Red"></button>
            <button class="swatch" data-color="#44aaff" style="background:#44aaff" title="Blue"></button>
            <button class="swatch" data-color="#44ff88" style="background:#44ff88" title="Green"></button>
            <button class="swatch" data-color="#ffcc00" style="background:#ffcc00" title="Yellow"></button>
            <button class="swatch" data-color="#ff8800" style="background:#ff8800" title="Orange"></button>
            <button class="swatch" data-color="#ffffff" style="background:#ffffff" title="White"></button>
          </div>
        </div>
        <!-- Erase All Drawings -->
        <button id="clearDrawingsBtn" class="danger-btn">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 2h8v8H2z" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M4 4l4 4M8 4l-4 4" stroke="currentColor" stroke-width="1.2"/></svg>
          CLEAR DRAWINGS
        </button>
      </section>
      <div class="panel-divider"></div>
      <!-- ACTIONS -->
      <section class="panel-section">
        <div class="section-header">
          <svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="5" stroke="#4fa3ff" stroke-width="1.2" fill="none"/><path d="M6 3v3l2 2" stroke="#4fa3ff" stroke-width="1.2" stroke-linecap="round"/></svg>
          <span>ACTIONS</span>
        </div>
        <button id="clearMarkersBtn" class="danger-btn">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 3h10M4 3V1h4v2M5 5v5M7 5v5M2 3l1 8h6l1-8" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
          CLEAR ALL MARKERS
        </button>
      </section>
    </aside>
    <!-- MAP -->
    <div id="mapWrapper">
      <div id="map"></div>
      <!-- Drawing canvas overlay — positioned absolutely relative to mapWrapper -->
      <canvas id="drawCanvas"></canvas>
      <!-- Right-click coordinate popup — BOTH only -->
      <div id="coordPopup" class="coord-popup">
        <div class="coord-popup-header">
          <svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" stroke="#4fa3ff" stroke-width="1" fill="none"/><line x1="5" y1="2" x2="5" y2="5" stroke="#4fa3ff" stroke-width="1.2"/><circle cx="5" cy="7" r="0.8" fill="#4fa3ff"/></svg>
          COORDINATES
        </div>
        <div class="coord-popup-row">
          <span class="coord-popup-label">COORDS</span>
          <span class="coord-popup-val mono" id="popupBoth">—</span>
          <button class="coord-copy-btn" id="copyBoth" title="Copy coordinates">
            <svg width="10" height="10" viewBox="0 0 10 10"><rect x="3" y="3" width="6" height="6" stroke="currentColor" stroke-width="1" fill="none"/><path d="M1 7V1h6" stroke="currentColor" stroke-width="1" fill="none"/></svg>
          </button>
        </div>
        <button id="coordPopupClose" class="coord-popup-close">✕</button>
      </div>
      <!-- Ruler tooltip -->
      <div id="rulerTooltip" class="ruler-tooltip"></div>
    </div>
    <!-- ── RIGHT SIDEBAR ── -->
    <aside id="rightPanel">
      <button class="rightBtn active" title="Zoom In" id="zoomInBtn">
        <svg width="16" height="16" viewBox="0 0 16 16"><line x1="8" y1="3" x2="8" y2="13" stroke="currentColor" stroke-width="1.8"/><line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="1.8"/></svg>
      </button>
      <button class="rightBtn" title="Zoom Out" id="zoomOutBtn">
        <svg width="16" height="16" viewBox="0 0 16 16"><line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="1.8"/></svg>
      </button>
      <div class="right-divider"></div>
      <button class="rightBtn" title="Fit to bounds" id="fitBtn">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M1 5V1h4M11 1h4v4M1 11v4h4M15 11v4h-4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
      <button class="rightBtn" title="Undo last action" id="undoBtn">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M3 8a5 5 0 1 1 1.5 3.5" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M3 4v4h4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
      <div class="right-divider"></div>
      <button class="rightBtn" title="Ruler — measure distance" id="rulerBtn">
        <svg width="16" height="16" viewBox="0 0 16 16">
          <rect x="1" y="6" width="14" height="4" rx="1" stroke="currentColor" stroke-width="1.4" fill="none"/>
          <line x1="4" y1="6" x2="4" y2="4" stroke="currentColor" stroke-width="1.2"/>
          <line x1="8" y1="6" x2="8" y2="3" stroke="currentColor" stroke-width="1.2"/>
          <line x1="12" y1="6" x2="12" y2="4" stroke="currentColor" stroke-width="1.2"/>
        </svg>
      </button>
    </aside>
  </div>
  <!-- ═══════════════ STATUS BAR ═══════════════ -->
  <footer id="statusBar">
    <div class="status-left">
      <span class="status-item" id="markerCount">MARKERS: 0</span>
      <span class="status-sep">|</span>
      <span class="status-item" id="drawModeStatus">DRAW: OFF</span>
      <span class="status-sep">|</span>
      <span class="status-item" id="rulerStatus">RULER: OFF</span>
    </div>
    <div class="status-center mono" id="statusCoords">Y: —  X: —</div>
    <div class="status-right">
      <span class="status-item" id="rulerReadout"></span>
    </div>
  </footer>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
